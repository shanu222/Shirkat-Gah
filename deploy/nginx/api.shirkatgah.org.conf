# Shirkat Gah API — api.shirkatgah.org
# Install: sudo cp deploy/nginx/api.shirkatgah.org.conf /etc/nginx/conf.d/
# Test:    sudo nginx -t && sudo systemctl reload nginx

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=api_conn:10m;

upstream shirkat_gah_api {
    least_conn;
    server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP → HTTPS redirect (uncomment when SSL is configured)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name api.shirkatgah.org;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    listen [::]:80;
    server_name api.shirkatgah.org;

    # Uncomment for HTTPS with ACM/Let's Encrypt certificates
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/api.shirkatgah.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.shirkatgah.org/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Health check (no rate limit)
    location = /api/v1/health {
        proxy_pass http://shirkat_gah_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # Swagger docs
    location /api/docs {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://shirkat_gah_api;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # API routes
    location / {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn api_conn 20;

        proxy_pass http://shirkat_gah_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;

        # Cache static API responses (optional — disable for dynamic endpoints)
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    access_log /var/log/nginx/api.shirkatgah.org.access.log;
    error_log  /var/log/nginx/api.shirkatgah.org.error.log warn;
}
