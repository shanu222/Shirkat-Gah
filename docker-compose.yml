services:
  postgres:
    image: postgres:16-alpine
    container_name: shirkat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shirkat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shirkat_secret}
      POSTGRES_DB: ${POSTGRES_DB:-shirkat_gah}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-shirkat} -d ${POSTGRES_DB:-shirkat_gah}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shirkat-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: shirkat-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    profiles: ['dev']

  mailhog:
    image: mailhog/mailhog:latest
    container_name: shirkat-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'
    profiles: ['dev']

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: shirkat-api
    restart: unless-stopped
    ports:
      - '${API_PORT:-3001}:3001'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-shirkat}:${POSTGRES_PASSWORD:-shirkat_secret}@postgres:5432/${POSTGRES_DB:-shirkat_gah}?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/v1/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine
    container_name: shirkat-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./deploy/nginx/api.shirkatgah.org.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    profiles: ['production']

volumes:
  postgres_data:
  redis_data:
  minio_data:
