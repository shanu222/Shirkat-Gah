name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shirkat
          POSTGRES_PASSWORD: shirkat_secret
          POSTGRES_DB: shirkat_gah
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://shirkat:shirkat_secret@localhost:5432/shirkat_gah?schema=public

      - name: Lint
        run: pnpm lint || true

      - name: Build API
        run: pnpm turbo run build --filter=@shirkat-gah/api

      - name: Build Web
        run: pnpm turbo run build --filter=@shirkat-gah/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000
